name: Deploy to VPS

on:
    push:
        branches: [main]

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
    build-web:
        name: Build and Push Web
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push web image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/web/Dockerfile
                  push: true
                  build-args: |
                      NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/towers-web:latest
                      ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/towers-web:${{ github.sha }}

    build-api:
        name: Build and Push API
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push api image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: apps/api/Dockerfile
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/towers-api:latest
                       ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/towers-api:${{ github.sha }}

    deploy:
        name: Deploy on VPS
        runs-on: ubuntu-latest
        needs:
            - build-web
            - build-api
        steps:
            - name: Setup SSH
              env:
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
              run: |
                  set -eu
                  mkdir -p ~/.ssh
                  printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

            - name: Deploy on server
              env:
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  VPS_USER: ${{ secrets.VPS_USER }}
              run: |
                  ssh "$VPS_USER@$VPS_HOST" << 'EOF'
                    set -e
                    cd /opt/towers
                    docker compose down
                    docker compose pull
                    docker compose up -d
                    docker image prune -f
                  EOF
